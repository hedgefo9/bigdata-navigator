database:
  host: "localhost"
  port: 5434
  username: "generation_user"
  password: "vault://secret/bigdata-navigator/generation#database_password"
  database: "generation"

auth:
  jwt_secret: "vault://secret/bigdata-navigator/generation#jwt_secret"
  jwt_algorithm: "HS256"
  token_ttl_minutes: 1440

search_service:
  base_url: "http://localhost:8001"
  timeout_seconds: 30

llm:
  provider: "openai_compatible"
  base_url: "http://localhost:1234/v1"
  api_key: ""
  model: "openai/gpt-oss-120b"
  temperature: 0.1
  max_tokens: 900
  timeout_seconds: 90

generation_api:
  host: "0.0.0.0"
  port: 8010
  history_window: 12

vault:
  url: "http://localhost:8200"
  token: "root"
  timeout_seconds: 5
