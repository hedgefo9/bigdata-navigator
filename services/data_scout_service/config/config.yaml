datasource:
    main:
        host: "localhost"
        port: 5432
        username: "navigator_user"
        password: "navigator_password"
        database: "navigator"

kafka:
    enabled: true
    bootstrap_servers:
        - "localhost:9092"
        - "kafka:29092"
    metadata_topic: "navigator.metadata"
    client_id: "data-scout-service"
    acks: "all"
    retries: 3
    request_timeout_ms: 30000
    max_block_ms: 60000
    metadata_max_age_ms: 300000
    reconnect_backoff_ms: 1000
    reconnect_backoff_max_ms: 10000
    send_timeout_seconds: 30
    flush_timeout_seconds: 30
    outbox_batch_size: 500

metadata_storage:
    table_name: "metadata_catalog"
    outbox_table_name: "metadata_outbox"
